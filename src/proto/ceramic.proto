syntax = "proto3";

package ceramic;

// Main service
service CeramicService {
  rpc Predict(PredictRequest) returns (PredictResponse);
}

// Predict Request
message PredictRequest {
  bytes image_data = 1;
  string file_name = 2;
}

// Predict Response
message PredictResponse {
  string status = 1;
  string file_name = 2;
  string prediction = 3;
  double confidence_score = 4;
}